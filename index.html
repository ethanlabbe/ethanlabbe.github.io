    <script>
        async function loadMarkdownContent() {
            const sections = [
                { selector: '#about-content', file: 'content/about.md' },
                { selector: '#project-stereo-vision-system', file: 'content/projects/stereo-vision.md' },
                { selector: '#project-guitar-pedal', file: 'content/projects/guitar-pedal.md' },
                { selector: '#project-fusion-energy-fuel-research', file: 'content/projects/fusion-energy-fuel-research.md' },
                { selector: '#project-solar-pv-home-automation', file: 'content/projects/solar-pv-home-automation.md' },
                { selector: '#project-uavcm', file: 'content/projects/uavcm.md' },
                { selector: '#contact-content', file: 'content/contact.md' }
            ];

            for (const section of sections) {
                const element = document.querySelector(section.selector);
                if (!element) continue;

                try {
                    const response = await fetch(section.file);
                    if (!response.ok) throw new Error(`Unable to load ${section.file}`);
                    const markdown = await response.text();
                    element.innerHTML = renderMarkdown(markdown, section.file);
                } catch (error) {
                    console.error(error);
                    element.innerHTML = '<p>Content could not be loaded.</p>';
                }
            }
        }

        function resolveMarkdownAsset(assetPath, baseFile) {
            if (!assetPath) return '';
            if (/^(https?:)?\/\//i.test(assetPath) || assetPath.startsWith('data:')) {
                return assetPath;
            }
            return new URL(assetPath, new URL(baseFile, window.location.href)).href;
        }

        function renderMarkdown(markdown, baseFile = '') {
            const lines = markdown.trim().split(/\r?\n/);
            let html = '';
            let paragraph = [];

            function flushParagraph() {
                if (paragraph.length) {
                    html += `<p>${paragraph.join(' ')}</p>`;
                    paragraph = [];
                }
            }

            function escapeHtml(value) {
                return value
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function formatInline(value) {
                let formatted = escapeHtml(value);
                formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
                formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                return formatted;
            }

            lines.forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed) {
                    flushParagraph();
                    return;
                }

                const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
                if (headingMatch) {
                    flushParagraph();
                    const level = headingMatch[1].length;
                    html += `<h${level}>${formatInline(headingMatch[2])}</h${level}>`;
                    return;
                }

                const imageMatch = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
                if (imageMatch) {
                    flushParagraph();
                    const imageSrc = resolveMarkdownAsset(imageMatch[2], baseFile);
                    html += `<img src="${imageSrc}" alt="${imageMatch[1] || ''}" class="project-image">`;
                    return;
                }

                paragraph.push(formatInline(trimmed));
            });

            flushParagraph();
            return html;
        }

        document.addEventListener('DOMContentLoaded', loadMarkdownContent);
    </script>
