<body id="top">

    </a>

    <nav class="jump-nav">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="spacer layer2">
    </div>

    <div class="container">
        <h1>Ethan Labbe</h1>
        <h2>Project Portfolio</h2>
    </div>

    <div class="spacer3"></div>
    <div class="spacer2 layer1"></div>

    <section id="about" class="yellow">
        <div class="about-grid">
            <img class="profile-photo" src="external/profile_photo.JPG" alt="Profile photo of Ethan Labbe">
            <div class="about-copy">
                <div id="about-content" class="markdown-content leftxt"></div>
            </div>
        </div>
    </section>

    <div class="spacer2 layer4"></div>

    <section id="projects">
        <h2>Projects</h2>

    </section>

    <div class="center">
        <img class="medpic" src="external/UAVCAD.jpg" alt="CAD Design of Vehicle">
        <img class="medpic" src="external/controlplot.jpg.png" alt="Control Plot">
        <img class="medpic" src="external/Divingplot.jpg.png" alt="Diving Plot">
    </div>

    <div class="layer3 spacer2"></div>

    <div id="contact" class="center red">
        <h2>Contact Me</h2>
    </div>

    <div class="center red">
        <div class="contact-row">
            <div id="contact-content" class="markdown-content contact-text"></div>
            <div class="social-links">
                <a class="social-link" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/ethan-labbe/">
                    <img class="icon" src="external/linlogo.png" alt="LinkedIn Logo">
                </a>

                <a class="social-link" target="_blank" rel="noopener noreferrer" href="https://github.com/EthanLabb">
                    <img class="icon" src="external/gitlogo.png" alt="GitHub Logo">
                </a>
            </div>
        </div>
    </div>

    <script>
        async function loadMarkdownContent() {
            const sections = [
                { selector: '#about-content', file: 'content/about.md' },
                { selector: '#projects-content', file: 'content/projects.md' },
                { selector: '#contact-content', file: 'content/contact.md' }
            ];

            for (const section of sections) {
                const element = document.querySelector(section.selector);
                if (!element) continue;

                try {
                    const response = await fetch(section.file);
                    if (!response.ok) throw new Error(`Unable to load ${section.file}`);
                    const markdown = await response.text();
                    element.innerHTML = renderMarkdown(markdown);
                } catch (error) {
                    console.error(error);
                    element.innerHTML = '<p>Content could not be loaded.</p>';
                }
            }
        }

        function renderMarkdown(markdown) {
            const lines = markdown.trim().split(/\r?\n/);
            let html = '';
            let paragraph = [];

            function flushParagraph() {
                if (paragraph.length) {
                    html += `<p>${paragraph.join(' ')}</p>`;
                    paragraph = [];
                }
            }

            function escapeHtml(value) {
                return value
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function formatInline(value) {
                let formatted = escapeHtml(value);
                formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
                formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                return formatted;
            }

            lines.forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed) {
                    flushParagraph();
                    return;
                }

                const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
                if (headingMatch) {
                    flushParagraph();
                    const level = headingMatch[1].length;
                    html += `<h${level}>${formatInline(headingMatch[2])}</h${level}>`;
                    return;
                }

                paragraph.push(formatInline(trimmed));
            });

            flushParagraph();
            return html;
        }

        document.addEventListener('DOMContentLoaded', loadMarkdownContent);
    </script>
</body>

</html>
